<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMD — Network Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f4c3a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{text-align:center;width:100%;max-width:560px;}
h1{font-size:26px;color:#fff;margin-bottom:6px;font-weight:800;letter-spacing:-0.5px;}
.sub{font-size:13px;color:#94a3b8;margin-bottom:40px;}
.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.card{background:#fff;border-radius:18px;padding:28px 32px;width:220px;cursor:pointer;text-decoration:none;box-shadow:0 8px 32px #0004;transition:transform .2s,box-shadow .2s;display:block;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 48px #0006;}
.card .icon{font-size:44px;margin-bottom:12px;}
.card h2{font-size:17px;font-weight:800;margin-bottom:5px;}
.card p{font-size:11px;color:#64748b;line-height:1.5;}
.card.asmd1{border-top:4px solid #1e3a5f;}.card.asmd1 h2{color:#1e3a5f;}
.card.asmd2{border-top:4px solid #1a4731;}.card.asmd2 h2{color:#1a4731;}
footer{margin-top:36px;font-size:11px;color:#475569;}
footer a{color:#64748b;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📡 ASMD Network Manager</h1>
  <p class="sub">اختر الشبكة للمتابعة — البيانات محفوظة على Supabase</p>
  <div class="cards">
    <a href="network_inventory.html" class="card asmd1">
      <div class="icon">🏢</div>
      <h2>ASMD 1</h2>
      <p>192.168.100.x<br>192.168.2.x</p>
    </a>
    <a href="asmd2.html" class="card asmd2">
      <div class="icon">🌐</div>
      <h2>ASMD 2</h2>
      <p>شبكة مستقلة<br>قابلة للتخصيص</p>
    </a>
  </div>
  <footer>Powered by GitHub Pages &amp; Gist Sync</footer>
</div>
</body>
</html>
